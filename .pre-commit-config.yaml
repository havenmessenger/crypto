repos:
  - repo: local
    hooks:
      - id: manifest-purity
        name: Manifest-purity (guard 1 — no non-crates.io deps)
        entry: python3 scripts/check_manifest_purity.py
        language: system
        pass_filenames: false

      - id: one-way-dep
        name: One-way dependency (guard 3 — no app/binding-crate references)
        entry: python3 scripts/check_one_way_dep.py
        language: system
        pass_filenames: false

      - id: tell-scan
        name: Tell-scan (guard 4 — no internal tracker IDs / dev IPs / founder PII)
        entry: python3 scripts/check_tell_scan.py
        language: system
        pass_filenames: true

      - id: public-comment-hygiene
        name: Public-comment-hygiene (guard 5 — no provenance/process narration in comments)
        entry: python3 scripts/check_public_comment_hygiene.py
        language: system
        pass_filenames: true

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-toml
      - id: check-yaml
      - id: check-merge-conflict
